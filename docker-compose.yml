version: '3.9'

services:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: builder        # use the builder stage for dev (includes devDeps)
    command: npm run start:dev
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/afrikamart
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules     # prevent host node_modules from shadowing
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (for caching / future BullMQ) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
